<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rough organic bark edge -->
    <filter id="roughbark" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="5" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Mask: white = show gold, black = transparent gap -->
    <mask id="ringmask">
      <!-- Bark outer shape (white = show) -->
      <circle cx="50" cy="50" r="46" fill="white" filter="url(#roughbark)"/>
      <!-- Gap 1 -->
      <ellipse cx="50.5" cy="49.5" rx="42"   ry="41.5" fill="black"/>
      <!-- Ring 1 -->
      <ellipse cx="50.2" cy="50.5" rx="38.5" ry="38"   fill="white"/>
      <!-- Gap 2 -->
      <ellipse cx="49.8" cy="50.3" rx="35"   ry="34.5" fill="black"/>
      <!-- Ring 2 -->
      <ellipse cx="50.5" cy="49.8" rx="31.5" ry="31"   fill="white"/>
      <!-- Gap 3 -->
      <ellipse cx="50"   cy="50.4" rx="28"   ry="27.5" fill="black"/>
      <!-- Ring 3 -->
      <ellipse cx="49.6" cy="50"   rx="24.5" ry="24"   fill="white"/>
      <!-- Gap 4 -->
      <ellipse cx="50.4" cy="49.6" rx="21"   ry="20.5" fill="black"/>
      <!-- Ring 4 -->
      <ellipse cx="50"   cy="50.3" rx="17.5" ry="17"   fill="white"/>
      <!-- Gap 5 -->
      <ellipse cx="49.7" cy="50"   rx="14"   ry="13.5" fill="black"/>
      <!-- Ring 5 -->
      <ellipse cx="50.3" cy="49.7" rx="11"   ry="10.5" fill="white"/>
      <!-- Gap 6 -->
      <ellipse cx="50"   cy="50.3" rx="8"    ry="7.5"  fill="black"/>
      <!-- Ring 6 -->
      <ellipse cx="49.8" cy="50"   rx="5.5"  ry="5"    fill="white"/>
      <!-- Gap 7 -->
      <ellipse cx="50.2" cy="49.9" rx="3.5"  ry="3"    fill="black"/>
      <!-- Pith -->
      <ellipse cx="50"   cy="50"   rx="2"    ry="1.8"  fill="white"/>
    </mask>
  </defs>

  <!-- Single gold rectangle, shaped by the mask -->
  <rect x="0" y="0" width="100" height="100" fill="#B89A5A" mask="url(#ringmask)"/>
</svg>
