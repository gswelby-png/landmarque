<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Admin — ParCark</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050505;
      min-height: 100vh;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.25rem;
    }
    .brand-mark { margin-bottom: .9rem; }
    .brand-wordmark {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .brand-sub {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,.25);
      margin-top: .5rem;
    }

    .panel {
      background: #fff;
      border-radius: 4px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
      border-top: 2px solid #8B3A2A;
    }
    .panel-title {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 1.5rem;
    }
    .alert {
      background: #fdf0ee;
      border-left: 3px solid #8B3A2A;
      color: #8B3A2A;
      font-size: .8rem;
      padding: .7rem 1rem;
      margin-bottom: 1.25rem;
      border-radius: 3px;
      font-weight: 600;
    }
    label {
      display: block;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #777;
      margin-bottom: .3rem;
    }
    input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: .75rem 1rem;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-size: .9rem;
      color: #111;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }
    input:focus { border-color: #8B3A2A; box-shadow: 0 0 0 3px rgba(139,58,42,.08); }

    .btn-submit {
      width: 100%;
      background: #111;
      border: none;
      color: #fff;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: .85rem;
      border-radius: 3px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-submit:hover { background: #8B3A2A; }

    .powered {
      margin-top: 2rem;
      font-size: .65rem;
      color: rgba(255,255,255,.15);
      font-weight: 300;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-mark">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#8B3A2A" stroke-width="1.5"/>
        <rect x="8.5" y="7.5" width="2" height="9" rx="0.5" fill="#8B3A2A"/>
        <path d="M10.5 7.5h2.5a2.5 2.5 0 0 1 0 5H10.5z" fill="#8B3A2A"/>
      </svg>
    </div>
    <div class="brand-wordmark"><span style="color:#8B3A2A">PAR</span><span style="color:#fff">CAR</span><span style="color:#8B3A2A">K</span></div>
    <div class="brand-sub">Admin Portal</div>
  </div>

  <div class="panel">
    <div class="panel-title">Sign in to continue</div>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login">
      <label>Email</label>
      <input type="email" name="email" required autofocus autocomplete="email">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">
      <button type="submit" class="btn-submit">Sign in</button>
    </form>
  </div>

  <p class="powered">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#8B3A2A" stroke-width="1.5"/>
      <rect x="8.5" y="7.5" width="2" height="9" rx="0.5" fill="#8B3A2A"/>
      <path d="M10.5 7.5h2.5a2.5 2.5 0 0 1 0 5H10.5z" fill="#8B3A2A"/>
    </svg>
    <span style="color:#8B3A2A">PAR</span><span>CAR</span><span style="color:#8B3A2A">K</span>
  </p>

</body>
</html>
