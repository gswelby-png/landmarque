<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ParCark{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #8B3A2A;
      --accent-dark: #6b2c1e;
      --surface: #ffffff;
      --bg: #f2f1ef;
      --border: #e4e2de;
      --text: #111111;
      --muted: #777777;
    }

    body {
      background: var(--bg);
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    /* ── Navbar ── */
    .navbar-brand { font-weight: 700; letter-spacing: 3px; }

    /* ── Cards ── */
    .card {
      border: 1px solid var(--border);
      border-radius: 3px;
      box-shadow: none;
      background: var(--surface);
    }

    /* Accent left-border variant */
    .card-accent {
      border-left: 3px solid var(--accent);
    }

    /* ── Buttons ── */
    .btn { border-radius: 3px; font-family: 'Raleway', Helvetica, Arial, sans-serif; }

    .btn-success,
    .btn-success:hover,
    .btn-success:focus,
    .btn-success:active { background-color: var(--accent) !important; border-color: var(--accent) !important; }

    .btn-primary,
    .btn-primary:hover,
    .btn-primary:focus { background-color: var(--accent) !important; border-color: var(--accent) !important; }

    .btn-dark,
    .btn-dark:hover { background-color: #111 !important; border-color: #111 !important; }

    .btn-outline-secondary:hover { background-color: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }

    /* ── Typography overrides ── */
    .text-success { color: var(--accent) !important; }
    .bg-success { background-color: var(--accent) !important; }
    .badge.bg-success { background-color: var(--accent) !important; }

    a { color: var(--accent); }
    a:hover { color: var(--accent-dark); }

    .nav-link { color: rgba(255,255,255,0.8) !important; }
    .nav-link:hover { color: #fff !important; }

    /* ── Section label (small uppercase tag above heading) ── */
    .section-tag {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .4rem;
    }

    /* ── Stat cards ── */
    .stat-card {
      border-left: 3px solid var(--accent);
      padding: 1.1rem 1.25rem;
    }
    .stat-card .stat-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    /* ── Tables ── */
    .table { font-size: .88rem; }
    .table thead th {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      background: transparent;
      padding-top: .75rem;
      padding-bottom: .75rem;
    }
    .table td { vertical-align: middle; border-color: var(--border); }
    .table-hover tbody tr:hover { background: #faf9f7; }

    /* ── Geometric rule / divider ── */
    .geo-rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
    }
    .geo-rule::before {
      content: '';
      width: 24px;
      height: 3px;
      background: var(--accent);
      flex-shrink: 0;
    }
    .geo-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .geo-rule span {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block navbar %}{% endblock %}
  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
