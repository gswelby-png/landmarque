<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ParCark{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f4f4f4; font-family: 'Raleway', Helvetica, Arial, sans-serif; }
    .navbar-brand { font-weight: 700; letter-spacing: 2px; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    /* ParCark brand overrides */
    .btn-success, .btn-success:hover, .btn-success:focus { background-color: #8B3A2A !important; border-color: #8B3A2A !important; }
    .btn-outline-secondary:hover { background-color: #8B3A2A !important; border-color: #8B3A2A !important; color: #fff !important; }
    .btn-primary, .btn-primary:hover { background-color: #8B3A2A !important; border-color: #8B3A2A !important; }
    .text-success { color: #8B3A2A !important; }
    .bg-success { background-color: #8B3A2A !important; }
    a { color: #8B3A2A; }
    a:hover { color: #6b2c1e; }
    .nav-link { color: rgba(255,255,255,0.8) !important; }
    .nav-link:hover { color: #fff !important; }
    .badge.bg-success { background-color: #8B3A2A !important; }
    .fs-3.fw-bold { color: #8B3A2A; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block navbar %}{% endblock %}
  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
