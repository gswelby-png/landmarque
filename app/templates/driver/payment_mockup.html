<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment — ParCark</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      padding-bottom: 60px;
    }
    .estate-header {
      text-align: center;
      padding: 2.5rem 1rem 2rem;
    }
    .estate-logo {
      max-width: 220px;
      height: auto;
      margin-bottom: 1.4rem;
    }
    .estate-name {
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 1rem;
    }
    .car-park-name {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .5px;
      margin: 0;
    }
    .placeholder {
      background: #fff;
      border-radius: 8px;
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 1rem;
    }
    .placeholder-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 1rem;
    }
    .placeholder-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #aaa;
    }
    .btn-pay {
      display: block;
      width: 100%;
      background: #8B3A2A;
      color: #fff;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: .85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 1rem;
      border-radius: 4px;
      text-decoration: none;
      text-align: center;
      transition: filter .15s;
      margin-top: .5rem;
    }
    .btn-pay:hover { filter: brightness(110%); color: #fff; }
    .stripe-note {
      font-size: .75rem;
      text-align: center;
      margin-top: .9rem;
      font-weight: 300;
      color: rgba(255,255,255,.3);
    }
  </style>
</head>
<body>

  <div style="max-width:520px; margin:0 auto; padding: 2rem 1rem 0;">

    <div class="estate-header">
      {% if logo_url %}
      <img src="{{ logo_url }}" alt="{{ estate_name }}" class="estate-logo">
      {% endif %}
      <h1 class="estate-name">{{ estate_name }}</h1>
      <p class="car-park-name">{{ car_park_name }}</p>
    </div>

    <div class="placeholder">
      <p class="placeholder-label">Payment</p>
      <p class="placeholder-title">Stripe goes here</p>
    </div>

    <div class="placeholder">
      <p class="placeholder-label">Card details</p>
      <p class="placeholder-title" style="font-size:.95rem; color:#ccc;">Card number, expiry, CVC</p>
    </div>

    <div class="placeholder">
      <p class="placeholder-label">Wallet</p>
      <p class="placeholder-title" style="font-size:.95rem; color:#ccc;">Apple Pay / Google Pay</p>
    </div>

    <a href="/receipt/{{ slug }}" class="btn-pay">Pay</a>

    <p class="stripe-note" style="padding:1rem 0;">
      Powered by <span style="color:#8B3A2A">PAR</span><span style="color:rgba(255,255,255,.4)">CAR</span><span style="color:#8B3A2A">K</span>
    </p>

  </div>

</body>
</html>
