<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt — ParCark</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #fff;
    }
    .placeholder {
      background: #111;
      border: 1px dashed rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .placeholder-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      margin-bottom: 1rem;
    }
    .placeholder-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: rgba(255,255,255,.6);
    }
    .powered {
      margin-top: 2rem;
      font-size: .65rem;
      color: rgba(255,255,255,.15);
      display: flex;
      gap: .25rem;
    }
  </style>
</head>
<body>

  <div class="placeholder">
    <p class="placeholder-label">Step 3 of 3</p>
    <p class="placeholder-title">Receipt — confirmation goes here</p>
  </div>

  <p class="powered" style="margin-top:2rem;">
    <span style="color:#8B3A2A">PAR</span><span>CAR</span><span style="color:#8B3A2A">K</span>
  </p>

</body>
</html>
