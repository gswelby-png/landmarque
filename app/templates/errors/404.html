<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found — ParCark</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050505;
      min-height: 100vh;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .mark { margin-bottom: 2rem; opacity: .4; }
    .code {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -2px;
      color: #fff;
      line-height: 1;
      margin-bottom: .5rem;
    }
    .code span { color: #8B3A2A; }
    .msg {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      margin-bottom: 2.5rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.12);
      padding: .65rem 1.5rem;
      border-radius: 3px;
      transition: border-color .15s, color .15s;
    }
    a:hover { border-color: #8B3A2A; color: #fff; }
  </style>
</head>
<body>
  <div class="mark">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#8B3A2A" stroke-width="1.5"/>
      <rect x="8.5" y="7.5" width="2" height="9" rx="0.5" fill="#8B3A2A"/>
      <path d="M10.5 7.5h2.5a2.5 2.5 0 0 1 0 5H10.5z" fill="#8B3A2A"/>
    </svg>
  </div>
  <p class="code"><span>4</span>0<span>4</span></p>
  <p class="msg">Page not found</p>
  <a href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to home
  </a>
</body>
</html>
