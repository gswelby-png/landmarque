<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ estate.name }}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #B89A5A; --accent-dark: #9a7e3e; --dark: #0a0a0a; }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 2.5rem;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(0,0,0,.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: none; text-decoration: none;
      display: flex; align-items: center;
    }
    .nav-logo-mark { width: 28px; height: 28px; margin-right: .6rem; vertical-align: middle; }
    .nav-right { display: flex; align-items: center; gap: 1.25rem; }
    .hamburger {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 5px; padding: .3rem;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: #B89A5A; border-radius: 1px;
      transition: transform .2s, opacity .2s;
    }

    /* ── Menu overlay ── */
    .menu-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #0a0a0a;
      z-index: 300;
      overflow-y: auto;
    }
    .menu-overlay.open { display: flex; flex-direction: column; }
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      flex-shrink: 0;
    }
    .menu-close {
      background: none; border: none; color: rgba(255,255,255,.5);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
      transition: color .15s;
    }
    .menu-close:hover { color: #fff; }
    .menu-body {
      padding: 3rem 2.5rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 3rem;
      max-width: 900px;
    }
    .menu-group-label {
      font-size: .6rem; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 1.1rem;
    }
    .menu-group a {
      display: block;
      font-size: .85rem; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; text-decoration: none;
      color: rgba(255,255,255,.6);
      padding: .45rem 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      transition: color .12s;
    }
    .menu-group a:last-child { border-bottom: none; }
    .menu-group a:hover { color: #fff; }

    /* ── Page ── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 9rem 2rem 5rem;
    }
    .page-eyebrow {
      font-size: .6rem; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: var(--accent); margin-bottom: .75rem;
    }
    .page-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      font-weight: 700; letter-spacing: 1px;
      text-transform: none; line-height: 1.05;
      margin-bottom: 1.5rem;
    }
    .page-rule {
      width: 36px; height: 1px;
      background: var(--accent); margin-bottom: 2.5rem;
    }
    .page-body {
      font-size: .95rem; font-weight: 300;
      color: rgba(255,255,255,.5); line-height: 1.85;
      max-width: 560px; margin-bottom: 2.5rem;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .68rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,255,255,.35);
      text-decoration: none; margin-top: 2rem;
      transition: color .12s;
    }
    .back-link:hover { color: rgba(255,255,255,.7); }

    /* ── Content panels ── */
    .content-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8rem 2rem;
      border-top: 1px solid rgba(255,255,255,.06);
      text-align: center;
    }
    .content-panel-inner { max-width: 580px; width: 100%; }
    .panel-mark { width: 56px; height: 56px; margin-bottom: 1.75rem; }
    .panel-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 700; letter-spacing: .5px;
      color: #fff; margin-bottom: 1.75rem; line-height: 1.05;
      text-align: center;
    }
    .panel-rule { width: 28px; height: 1px; background: var(--accent); margin: 0 auto 2rem; }
    .panel-body {
      font-size: 1rem; font-weight: 300; line-height: 1.9;
      color: rgba(255,255,255,.5); margin-bottom: 3rem;
    }
    .panel-cta {
      display: inline-flex; align-items: center; gap: .55rem;
      background: var(--accent); color: #fff; text-decoration: none;
      font-size: .68rem; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; padding: .9rem 2rem;
      border-radius: 3px; transition: filter .15s;
    }
    .panel-cta:hover { filter: brightness(110%); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid rgba(255,255,255,.05);
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .foot-brand {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem; font-weight: 700;
      letter-spacing: 1px; text-transform: none; text-decoration: none;
    }
    .foot-copy { font-size: .65rem; color: rgba(255,255,255,.15); font-weight: 300; }

    {% block extra_css %}{% endblock %}

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.25rem; }
      .menu-header { padding: 1.2rem 1.25rem; }
      .menu-body { padding: 2rem 1.25rem 3rem; }
      .content-panel { padding: 5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/location/{{ slug }}" class="nav-brand">
      <img src="/static/treering1_gold.png" class="nav-logo-mark" alt="">
      <span style="color:#B89A5A">{{ estate.name }}</span>
    </a>
    <div class="nav-right">
      <button class="hamburger" onclick="openMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-header">
      <a href="/location/{{ slug }}" class="nav-brand" onclick="closeMenu()">
        <img src="/static/treering1_gold.png" class="nav-logo-mark" alt="">
        <span style="color:#fff">{{ estate.name }}</span>
      </a>
      <button class="menu-close" onclick="closeMenu()">&#10005;</button>
    </div>
    <div class="menu-body">
      <div class="menu-group">
        <div class="menu-group-label">{{ estate.name }}</div>
        <a href="/location/{{ slug }}" onclick="closeMenu()">Home</a>
        <a href="/location/{{ slug }}/parking" onclick="closeMenu()">Parking</a>
        <a href="/location/{{ slug }}/walking-routes" onclick="closeMenu()">Walking Routes</a>
        <a href="/location/{{ slug }}/cycle-routes" onclick="closeMenu()">Cycle Routes</a>
        <a href="/location/{{ slug }}/places-of-interest" onclick="closeMenu()">Places of Interest</a>
        <a href="/location/{{ slug }}/legacies" onclick="closeMenu()">Legacies</a>
        <a href="/location/{{ slug }}/benches" onclick="closeMenu()">Benches</a>
        <a href="/location/{{ slug }}/trees" onclick="closeMenu()">Trees</a>
        <a href="/location/{{ slug }}/about" onclick="closeMenu()">About</a>
        <a href="/location/{{ slug }}/contact" onclick="closeMenu()">Get in touch</a>
      </div>
    </div>
  </div>

  <div class="page-wrap">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <a href="/location/{{ slug }}" class="foot-brand" style="color:rgba(255,255,255,.6)">{{ estate.name }}</a>
    <span class="foot-copy">&copy; 2026 {{ estate.name }}</span>
  </footer>

  <script>
    function openMenu() {
      document.getElementById('menu-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeMenu() {
      document.getElementById('menu-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
  </script>

</body>
</html>
