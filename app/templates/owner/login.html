<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Login — ParCark</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      min-height: 100vh;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
    }
    .brand-sub {
      font-size: .72rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: .4rem;
    }
    .divider {
      width: 32px;
      height: 2px;
      background: #8B3A2A;
      margin: 1rem auto 0;
    }
    .panel {
      background: #fff;
      border-radius: 3px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      border-top: 3px solid #8B3A2A;
    }
    .panel-title {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1.5rem;
    }
    .alert {
      background: #fdf0ee;
      border-left: 3px solid #8B3A2A;
      color: #8B3A2A;
      font-size: .85rem;
      padding: .75rem 1rem;
      margin-bottom: 1.2rem;
      border-radius: 3px;
    }
    label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: .35rem;
    }
    input {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      padding: .75rem 1rem;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-size: .95rem;
      color: #111;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }
    input:focus { border-color: #8B3A2A; }
    button {
      width: 100%;
      background: #8B3A2A;
      border: none;
      color: #fff;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: .85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: .85rem;
      border-radius: 3px;
      cursor: pointer;
      transition: filter .15s;
      margin-top: .25rem;
    }
    button:hover { filter: brightness(115%); }
    .footer-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: .72rem;
      color: rgba(255,255,255,0.3);
      font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-name"><span style="color:#8B3A2A">PAR</span><span style="color:#fff">CAR</span><span style="color:#8B3A2A">K</span></div>
    <div class="brand-sub">Owner Portal</div>
    <div class="divider"></div>
  </div>

  <div class="panel" id="panel-signin" style="display:block;">
    <div class="panel-title">Sign in to your account</div>
    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/owner/login">
      <label>Email</label>
      <input type="email" name="email" required autofocus>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit">Sign in</button>
    </form>
    <p style="text-align:center; margin-top:1.25rem;">
      <a href="#" onclick="switchPanel('pw'); return false;" style="font-size:.72rem; color:#aaa; text-decoration:none; letter-spacing:1px;">Change password</a>
    </p>
  </div>

  <div class="panel" id="panel-pw" style="display:none;">
    <div class="panel-title">Change password</div>
    {% if pw_ok %}
    <div class="alert" style="background:#e9f7ee; border-left-color:#1a6b2a; color:#1a6b2a;">Password updated — please sign in.</div>
    {% elif pw_error %}
    <div class="alert">Incorrect email or password. Please try again.</div>
    {% endif %}
    <form method="post" action="/owner/reset-password">
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Current password</label>
      <input type="password" name="current_password" required>
      <label>New password</label>
      <input type="password" name="new_password" required minlength="6">
      <button type="submit">Update password</button>
    </form>
    <p style="text-align:center; margin-top:1.25rem;">
      <a href="#" onclick="switchPanel('signin'); return false;" style="font-size:.72rem; color:#aaa; text-decoration:none; letter-spacing:1px;">Back to sign in</a>
    </p>
  </div>

  <p class="footer-note">Powered by <span style="color:#8B3A2A">PAR</span><span style="color:rgba(255,255,255,0.3)">CAR</span><span style="color:#8B3A2A">K</span></p>

  <script>
    function switchPanel(name) {
      document.getElementById('panel-signin').style.display = name === 'signin' ? 'block' : 'none';
      document.getElementById('panel-pw').style.display = name === 'pw' ? 'block' : 'none';
    }
    {% if pw_ok or pw_error %}
    switchPanel('pw');
    {% endif %}
  </script>

</body>
</html>
