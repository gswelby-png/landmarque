<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Owner Portal — ParCark</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .brand { text-align: center; margin-bottom: 2.25rem; }
    .brand-wordmark {
      font-size: 1.6rem; font-weight: 800;
      letter-spacing: 7px; text-transform: uppercase; line-height: 1;
    }
    .brand-sub {
      font-size: .6rem; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,.22); margin-top: .55rem;
    }
    .panel {
      background: #fff; border-radius: 4px; padding: 2.25rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      border-top: 2px solid #8B3A2A;
    }
    .panel-title {
      font-size: .63rem; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: #999; margin-bottom: 1.5rem;
    }
    .alert {
      font-size: .8rem; padding: .7rem 1rem; margin-bottom: 1.25rem;
      border-radius: 3px; font-weight: 600;
    }
    .alert-err { background: #fdf0ee; border-left: 3px solid #8B3A2A; color: #7a5f20; }
    .alert-ok  { background: #e8f5ec; border-left: 3px solid #1a6b2a; color: #155223; }
    label {
      display: block; font-size: .63rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: #777; margin-bottom: .3rem;
    }
    input {
      width: 100%; border: 1px solid #ddd; border-radius: 3px;
      padding: .75rem 1rem; font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-size: .9rem; color: #111; outline: none; margin-bottom: 1rem;
      transition: border-color .15s; background: #fff;
    }
    input:focus { border-color: #8B3A2A; box-shadow: 0 0 0 3px rgba(139,58,42,.1); }
    .btn-submit {
      width: 100%; background: #111; border: none; color: #fff;
      font-family: 'Raleway', Helvetica, Arial, sans-serif; font-weight: 700;
      font-size: .75rem; letter-spacing: 3px; text-transform: uppercase;
      padding: .9rem; border-radius: 3px; cursor: pointer; transition: background .15s;
    }
    .btn-submit:hover { background: #8B3A2A; }
    .panel-footer { text-align: center; margin-top: 1.25rem; }
    .panel-footer a {
      font-size: .65rem; color: #bbb; text-decoration: none;
      letter-spacing: .5px; transition: color .15s;
    }
    .panel-footer a:hover { color: #8B3A2A; }
    .powered {
      margin-top: 2rem; font-size: .62rem; color: rgba(255,255,255,.15);
      font-weight: 300; letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-wordmark">
      <span style="color:#8B3A2A">PAR</span><span style="color:#fff">CAR</span><span style="color:#8B3A2A">K</span>
    </div>
    <div class="brand-sub">Owner Portal</div>
  </div>

  <div class="panel" id="panel-signin">
    <div class="panel-title">Sign in to your account</div>
    {% if error %}<div class="alert alert-err">{{ error }}</div>{% endif %}
    <form method="post" action="/owner/login">
      <label>Email</label>
      <input type="email" name="email" required autofocus autocomplete="email">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">
      <button type="submit" class="btn-submit">Sign in</button>
    </form>
    <div class="panel-footer">
      <a href="#" onclick="switchPanel('pw'); return false;">Forgot or change password?</a>
    </div>
  </div>

  <div class="panel" id="panel-pw" style="display:none;">
    <div class="panel-title">Change password</div>
    {% if pw_ok %}<div class="alert alert-ok">Password updated — please sign in.</div>{% endif %}
    {% if pw_error %}<div class="alert alert-err">Incorrect email or current password.</div>{% endif %}
    <form method="post" action="/owner/reset-password">
      <label>Email</label>
      <input type="email" name="email" required autocomplete="email">
      <label>Current password</label>
      <input type="password" name="current_password" required autocomplete="current-password">
      <label>New password</label>
      <input type="password" name="new_password" required minlength="6" autocomplete="new-password">
      <button type="submit" class="btn-submit">Update password</button>
    </form>
    <div class="panel-footer">
      <a href="#" onclick="switchPanel('signin'); return false;">Back to sign in</a>
    </div>
  </div>

  <p class="powered"><span style="color:#8B3A2A">PAR</span>CAR<span style="color:#8B3A2A">K</span></p>

  <script>
    function switchPanel(name) {
      document.getElementById('panel-signin').style.display = name === 'signin' ? 'block' : 'none';
      document.getElementById('panel-pw').style.display    = name === 'pw'     ? 'block' : 'none';
    }
    {% if pw_ok or pw_error %}switchPanel('pw');{% endif %}
  </script>
</body>
</html>
