<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Owner Portal — LandMarque</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    /* Brand */
    .brand { text-align: center; margin-bottom: 2.5rem; }
    .brand-mark {
      width: 36px; height: 36px; margin: 0 auto .75rem;
      opacity: .9;
    }
    .brand-wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.7rem; font-weight: 700;
      letter-spacing: 1.5px; line-height: 1;
    }
    .brand-sub {
      font-size: .58rem; font-weight: 700; letter-spacing: 4px;
      text-transform: uppercase; color: rgba(255,255,255,.2); margin-top: .6rem;
    }

    /* Panel */
    .panel {
      background: #111;
      border: 1px solid rgba(255,255,255,.07);
      border-top: 2px solid #B89A5A;
      border-radius: 4px;
      padding: 2.25rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }
    .panel-title {
      font-size: .58rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.25); margin-bottom: 1.75rem;
    }

    /* Alerts */
    .alert {
      font-size: .8rem; padding: .75rem 1rem; margin-bottom: 1.25rem;
      border-radius: 3px; font-weight: 600; line-height: 1.5;
    }
    .alert-err {
      background: rgba(180,40,40,.1);
      border-left: 3px solid rgba(180,40,40,.6);
      color: rgba(255,180,180,.8);
    }
    .alert-ok {
      background: rgba(40,160,80,.08);
      border-left: 3px solid rgba(40,160,80,.5);
      color: rgba(150,255,180,.75);
    }

    /* Form */
    label {
      display: block; font-size: .58rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: #B89A5A; margin-bottom: .4rem;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 3px;
      padding: .78rem 1rem;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-size: .9rem; font-weight: 300;
      color: #fff; outline: none;
      margin-bottom: 1.1rem;
      transition: border-color .15s, background .15s;
    }
    input::placeholder { color: rgba(255,255,255,.2); }
    input:focus {
      border-color: rgba(184,154,90,.6);
      background: rgba(184,154,90,.04);
      box-shadow: 0 0 0 3px rgba(184,154,90,.08);
    }

    .btn-submit {
      width: 100%;
      background: #B89A5A; border: none; color: #fff;
      font-family: 'Raleway', Helvetica, Arial, sans-serif;
      font-weight: 700; font-size: .72rem;
      letter-spacing: 3px; text-transform: uppercase;
      padding: .95rem; border-radius: 3px;
      cursor: pointer; transition: filter .15s;
    }
    .btn-submit:hover { filter: brightness(110%); }

    .panel-footer { text-align: center; margin-top: 1.5rem; }
    .panel-footer a {
      font-size: .65rem; color: rgba(255,255,255,.25);
      text-decoration: none; letter-spacing: .5px;
      transition: color .15s;
    }
    .panel-footer a:hover { color: #B89A5A; }

    /* Back link */
    .back-home {
      margin-top: 2rem;
      font-size: .62rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,.15);
      text-decoration: none; transition: color .15s;
    }
    .back-home:hover { color: rgba(255,255,255,.4); }
  </style>
</head>
<body>

  <div class="brand">
    <img src="/static/treering1_gold.png" class="brand-mark" alt="">
    <div class="brand-wordmark">
      <span style="color:#B89A5A">Land</span><span style="color:#fff">Marque</span>
    </div>
    <div class="brand-sub">Owner Portal</div>
  </div>

  <!-- Sign-in panel -->
  <div class="panel" id="panel-signin">
    <div class="panel-title">Sign in to your account</div>
    {% if error %}<div class="alert alert-err">{{ error }}</div>{% endif %}
    <form method="post" action="/owner/login">
      <label>Email</label>
      <input type="email" name="email" required autofocus autocomplete="email" placeholder="you@estate.co.uk">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      <button type="submit" class="btn-submit">Sign in</button>
    </form>
    <div class="panel-footer">
      <a href="#" onclick="switchPanel('pw'); return false;">Forgot or change password?</a>
    </div>
  </div>

  <!-- Change password panel -->
  <div class="panel" id="panel-pw" style="display:none;">
    <div class="panel-title">Change password</div>
    {% if pw_ok %}<div class="alert alert-ok">Password updated — please sign in.</div>{% endif %}
    {% if pw_error %}<div class="alert alert-err">Incorrect email or current password.</div>{% endif %}
    <form method="post" action="/owner/reset-password">
      <label>Email</label>
      <input type="email" name="email" required autocomplete="email" placeholder="you@estate.co.uk">
      <label>Current password</label>
      <input type="password" name="current_password" required autocomplete="current-password" placeholder="••••••••">
      <label>New password</label>
      <input type="password" name="new_password" required minlength="6" autocomplete="new-password" placeholder="Min. 6 characters">
      <button type="submit" class="btn-submit">Update password</button>
    </form>
    <div class="panel-footer">
      <a href="#" onclick="switchPanel('signin'); return false;">Back to sign in</a>
    </div>
  </div>

  <a href="/" class="back-home">← LandMarque</a>

  <script>
    function switchPanel(name) {
      document.getElementById('panel-signin').style.display = name === 'signin' ? 'block' : 'none';
      document.getElementById('panel-pw').style.display    = name === 'pw'     ? 'block' : 'none';
    }
    {% if pw_ok or pw_error %}switchPanel('pw');{% endif %}
  </script>
</body>
</html>
